name: format

on:
    push:

jobs:
    format:
        name: prettier
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: oven-sh/setup-bun@v1
            - run: bun install
            - run: make format
            - uses: stefanzweifel/git-auto-commit-action@v5
              with:
                commit_message: "perf: formatting (ci)"
