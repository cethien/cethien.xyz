name: Prettier

on:
    push:

jobs:
    prettier:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                ref: ${{ github.head_ref }}
            - name: Prettify code
              uses: creyD/prettier_action@v4.3
              with:
                prettier_options: --write **/*.{html,css,js,ts,md,json}
                only_changed: True
