name: Publish

on:
    push:
        branches: ['main']

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Publish to Cloudflare Pages
              uses: cloudflare/pages-action@v1
              with:
                apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                accountId: 8b813ddd5531f714ca1002f289e424ab
                projectName: cethien
                directory: ./public
                branch: main
                wranglerVersion: '3'